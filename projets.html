<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="stylesheet" href="style.css">
  <title>Projets — Iceolie</title>
</head>
<body>

<header class="site-header">
  <div class="top-bar">
    <a href="index.html" class="logo"><img src="img/ICEOLIE-HEADER.png" alt="iceolie"></a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="lexique.html" class="nav-link">Lexique</a>
      <a href="projets.html" class="nav-link active">Projets</a>
      <a href="admin.html" class="nav-link">Admin</a>
      <a href="couleurs.html" class="nav-link">Couleurs</a>
    </nav>
  </div>
</header>

<h1>Projets</h1>

<main class="page-content">

  <div class="content-header">
    <h2>Savoir où l'on va pour ne pas se perdre</h2>
    <button class="btn-add" onclick="openOverlay()">+ Ajouter</button>
  </div>

  <div class="filter-group" id="filterGroup">
    <button class="btn-filter active" data-cat="tous">Tous</button>
    <button class="btn-filter" data-cat="Inspiration">Inspiration</button>
    <button class="btn-filter" data-cat="Impression 3D">Impression 3D</button>
    <button class="btn-filter" data-cat="Business">Business</button>
    <button class="btn-filter" data-cat="Matériaux">Matériaux</button>
  </div>

  <div id="status-msg" class="status-msg">Chargement...</div>
  <div id="projectsContainer"></div>

</main>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="closeOverlayOutside(event)">
  <div class="overlay-box">

    <div class="overlay-header">
      <h3 id="overlayTitle">Nouveau projet</h3>
      <button class="overlay-close" onclick="closeOverlay()">✕</button>
    </div>

    <form id="projectForm">
      <input type="hidden" id="projId">

      <div class="form-row">
        <div class="form-group">
          <label for="projTitle">Titre</label>
          <input type="text" id="projTitle" placeholder="Nom du projet..." required>
        </div>
        <div class="form-group">
          <label for="projCat">Catégorie</label>
          <select id="projCat" onchange="toggleImpressionFields()">
            <option value="Inspiration">Inspiration</option>
            <option value="Impression 3D">Impression 3D</option>
            <option value="Business">Business</option>
            <option value="Matériaux">Matériaux</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="projLink">Lien source</label>
        <input type="url" id="projLink" placeholder="https://...">
      </div>

      <div class="form-group">
        <label for="projInfos">Image (URL)</label>
        <input type="url" id="projInfos" placeholder="https://... (optionnel)">
      </div>

      <div class="form-group">
        <label for="projDesc">Description</label>
        <textarea id="projDesc" placeholder="Notes, observations, idées..." rows="3"></textarea>
      </div>

      <div class="form-group">
        <label for="projStatus">Statut</label>
        <select id="projStatus">
          <option value="idée">Idée</option>
          <option value="en cours">En cours</option>
          <option value="terminé">Terminé</option>
          <option value="en pause">En pause</option>
        </select>
      </div>

      <!-- Champs impression 3D — masqués par défaut -->
      <div id="impressionFields" class="impression-section" style="display:none;">
        <div class="impression-title">Détails impression 3D</div>
        <div class="form-row">
          <div class="form-group">
            <label for="projResine">Résine / Filament</label>
            <input type="text" id="projResine" placeholder="ex: PLA, PETG, résine UV...">
          </div>
          <div class="form-group">
            <label for="projTemps">Temps d'impression</label>
            <input type="text" id="projTemps" placeholder="ex: 4h30">
          </div>
        </div>
        <div class="form-group">
          <label for="projConfig">Configuration imprimante</label>
          <input type="text" id="projConfig" placeholder="ex: 0.2mm, 20% remplissage...">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-filter" onclick="closeOverlay()">Annuler</button>
        <button type="submit" class="btn-filter active" id="submitBtn">Ajouter</button>
      </div>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<script src="./scripts/projets.js"></script>
</body>
</html>
